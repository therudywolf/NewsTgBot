services:
  panel:
    build: .
    container_name: news-tg-bot-panel
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command:
      [
        "uvicorn",
        "web_app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--proxy-headers",
        "--forwarded-allow-ips=*"
      ]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  bot:
    build: .
    container_name: news-tg-bot-worker
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: ["python", "run_bot.py"]
