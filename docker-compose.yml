services:
  panel:
    build: .
    container_name: news-tg-bot-panel
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: ["uvicorn", "web_app:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  bot:
    build: .
    container_name: news-tg-bot-worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command:
      [
        "sh",
        "-c",
        "while true; do python bot.py; echo 'bot stopped; retrying in 30 seconds'; sleep 30; done"
      ]
