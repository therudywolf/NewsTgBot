services:
  bot:
    build: .
    container_name: news-tg-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Персистентное хранение БД и данных
      - ./data:/app/data
    environment:
      - DATABASE_PATH=/app/data/news_bot.db
      - CHANNELS_JSON_PATH=/app/data/channels.json
