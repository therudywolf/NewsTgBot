name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Linting & Format Check

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 pylint

      - name: Black format check
        run: black --check .

      - name: isort import sort check
        run: isort --check-only .

      - name: Flake8 linting
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Pylint
        run: pylint **/*.py --disable=all --enable=syntax-error --fail-under=8.0 || true

  type-check:
    runs-on: ubuntu-latest
    name: Type Checking

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-feedparser types-requests types-python-dateutil

      - name: MyPy type check
        run: mypy . --ignore-missing-imports || true

  security:
    runs-on: ubuntu-latest
    name: Security Scanning

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install detect-secrets bandit safety

      - name: Detect secrets
        run: detect-secrets scan --baseline .secrets.baseline || true

      - name: Bandit security check
        run: bandit -r . -ll || true

      - name: Safety check for known vulnerabilities
        run: safety check --json || true

